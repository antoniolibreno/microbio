<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Fragmento da sidebar administrativa.
  Uso: <aside th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></aside>
  Valores válidos para activePage: 'dashboard', 'usuarios', 'indicadores', 'pedidos', 'analises'
-->
<aside th:fragment="sidebar(activePage)" class="sidebar">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Sidebar — estilo canônico. Vive dentro do fragmento para que seja injetado junto
       pelo th:replace e sobrescreva qualquer regra divergente declarada nos templates. */
    .sidebar, .sidebar * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .sidebar { width: 240px; background: #ffffff; border-right: 1px solid #e2e8f0;
               display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sidebar-brand { display: flex; align-items: center; justify-content: center;
                     padding: 20px; border-bottom: 1px solid #e2e8f0; }
    .sidebar-brand img { display: block; max-width: 100%; height: auto; max-height: 56px; object-fit: contain; }
    .sidebar-nav { flex: 1; padding: 12px; overflow-y: auto; }
    .nav-section { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase;
                   letter-spacing: .5px; padding: 10px 12px 6px; display: block; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
                color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500;
                border-left: 3px solid transparent; transition: all .15s; margin-bottom: 2px; }
    .nav-link:hover { background: #f8fafc; color: #16a34a; }
    .nav-link.active { background: #f0fdf4; color: #16a34a; border-left-color: #16a34a; font-weight: 600; }
    .sidebar-footer { padding: 12px; border-top: 1px solid #e2e8f0; }
    .user-info { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 4px; }
    .user-avatar { width: 32px; height: 32px; background: #f0fdf4; color: #16a34a; border-radius: 50%;
                   display: flex; align-items: center; justify-content: center;
                   font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; color: #0f172a; }
    .user-role { font-size: 11px; color: #64748b; }
    .btn-logout { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 9px;
                  background: none; border: 1px solid #e2e8f0; border-radius: 8px; color: #64748b;
                  font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-logout:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
  </style>
  <div class="sidebar-brand">
    <img th:src="@{/logo.png}" alt="Microbio"
         style="display:block;max-width:100%;height:auto;max-height:56px;object-fit:contain;"/>
  </div>
  <nav class="sidebar-nav">
    <span class="nav-section">Geral</span>
    <a th:href="@{/dashboard}"
       th:classappend="${activePage == 'dashboard'} ? 'active'"
       class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>
    <span class="nav-section">Cadastros</span>
    <a th:href="@{/usuarios}"
       th:classappend="${activePage == 'usuarios'} ? 'active'"
       class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Usuários
    </a>
    <span class="nav-section">Operações</span>
    <a th:href="@{/indicadores}"
       th:classappend="${activePage == 'indicadores'} ? 'active'"
       class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Orçamentos
    </a>
    <a th:href="@{/pedidos}"
       th:classappend="${activePage == 'pedidos'} ? 'active'"
       class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1"/>
        <path d="M9 14l2 2 4-4"/>
      </svg>
      Pedidos
    </a>
    <a th:href="@{/analises}"
       th:classappend="${activePage == 'analises'} ? 'active'"
       class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Análises
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">A</div>
      <div>
        <div class="user-name" sec:authentication="name">admin</div>
        <div class="user-role">Administrador</div>
      </div>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn-logout">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </form>
  </div>
</aside>

</body>
</html>
