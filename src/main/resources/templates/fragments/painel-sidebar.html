<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Fragmento da sidebar do painel do cliente.
  Uso: <aside th:replace="~{fragments/painel-sidebar :: sidebar('inicio')}"></aside>
  Valores válidos para activePage: 'inicio', 'orcamentos', 'pedidos', 'meus-dados'
-->
<aside th:fragment="sidebar(activePage)" class="sidebar">
  <div class="sidebar-brand">
    <h1>Microbio</h1>
    <p>Laboratório de microbiologia</p>
  </div>
  <nav class="sidebar-nav">
    <span class="nav-section">Minha conta</span>
    <a th:href="@{/painel}"
       class="nav-link"
       th:classappend="${activePage == 'inicio'} ? ' active'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Início
    </a>
    <a th:href="@{/painel/orcamentos}"
       class="nav-link"
       th:classappend="${activePage == 'orcamentos'} ? ' active'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Meus Orçamentos
    </a>
    <a th:href="@{/painel/pedidos}"
       class="nav-link"
       th:classappend="${activePage == 'pedidos'} ? ' active'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      Meus Pedidos
    </a>
    <a th:href="@{/painel/meus-dados}"
       class="nav-link"
       th:classappend="${activePage == 'meus-dados'} ? ' active'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Meus Dados
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar"
           th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">C</div>
      <div>
        <div class="user-name" sec:authentication="name">cliente</div>
        <div class="user-role">Cliente</div>
      </div>
    </div>
    <div class="sidebar-footer-actions">
      <form th:action="@{/logout}" method="post" style="flex:1">
        <button type="submit" class="btn-logout">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair
        </button>
      </form>
      <button th:replace="~{fragments/toast :: themeToggle}"></button>
    </div>
  </div>
</aside>

</body>
</html>
