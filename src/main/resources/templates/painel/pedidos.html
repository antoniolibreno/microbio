<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Microbio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/painel/pedidos.css}">
</head>
<body>
<aside th:replace="~{fragments/painel-sidebar :: sidebar('pedidos')}"></aside>

<main class="main">
    <div class="page-header">
        <h2>Meus Pedidos</h2>
        <p>Visualize e acompanhe o andamento de cada pedido e suas análises.</p>
    </div>

    <div class="table-card">
        <div th:if="${#lists.isEmpty(pedidos)}" class="empty-state">
            <div class="icon">🔬</div>
            <h3>Nenhum pedido ainda</h3>
            <p>Os pedidos aparecerão aqui após o laboratório processar seus orçamentos.</p>
        </div>
        <table th:unless="${#lists.isEmpty(pedidos)}" style="width:100%;border-collapse:collapse">
            <thead><tr class="t-head">
                <th>Nº Pedido</th>
                <th>Data</th>
                <th>Orçamento</th>
                <th>Serviço</th>
                <th>Análises</th>
                <th>Status</th>
                <th></th>
            </tr></thead>
            <tbody>
            <tr th:each="pedido : ${pedidos}"
                th:with="orc=${pedido.orcamento}"
                class="t-row">
                <td style="font-family:monospace;font-weight:600;color:var(--text-muted)" th:text="'#PED-' + ${pedido.id}">—</td>
                <td style="color:var(--text-muted)" th:text="${#temporals.format(pedido.dataPedido,'dd/MM/yyyy')}">—</td>
                <td>
                    <a th:if="${orc != null}" th:href="@{/painel/orcamentos/{id}(id=${orc.id})}" class="link-muted"
                       th:text="'#' + ${orc.id}">—</a>
                    <span th:unless="${orc != null}" style="color:var(--text-faint)">—</span>
                </td>
                <td th:text="${orc != null and orc.pessoa != null and orc.pessoa.tipoServico != null ? orc.pessoa.tipoServico : 'Laboratorial'}">—</td>
                <td style="color:var(--text-muted)" th:text="${#lists.size(pedido.analises)}">0</td>
                <td>
                        <span class="status-badge"
                              th:classappend="${pedido.status == 'PENDENTE'} ? 's-pendente' : (${pedido.status == 'EM_ANDAMENTO'} ? 's-em_andamento' : (${pedido.status == 'CONCLUIDO'} ? 's-concluido' : 's-cancelado'))"
                              th:text="${pedido.status == 'PENDENTE' ? 'Pendente' : (pedido.status == 'EM_ANDAMENTO' ? 'Em andamento' : (pedido.status == 'CONCLUIDO' ? 'Concluído' : 'Cancelado'))}">—</span>
                </td>
                <td><a th:href="@{/painel/pedidos/{id}(id=${pedido.id})}" class="link-ver">Ver detalhes →</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
