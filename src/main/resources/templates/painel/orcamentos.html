<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Orçamentos - Microbio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/painel/orcamentos.css}">
</head>
<body>
<aside th:replace="~{fragments/painel-sidebar :: sidebar('orcamentos')}"></aside>

<main class="main">
    <div class="page-header">
        <div>
            <h2>Meus Orçamentos</h2>
            <p>Acompanhe o status de todas as suas solicitações.</p>
        </div>
        <a th:href="@{/painel/orcamentos/novo}" class="btn-primary">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo orçamento
        </a>
    </div>

    <div th:if="${sucesso}" class="alert alert-ok">✅ <span th:text="${sucesso}"></span></div>
    <div th:if="${erro}"    class="alert alert-err">❌ <span th:text="${erro}"></span></div>

    <div class="table-card">
        <div th:if="${#lists.isEmpty(orcamentos)}" class="empty-state">
            <div class="icon">📋</div>
            <h3>Nenhum orçamento ainda</h3>
            <p>Solicite seu primeiro orçamento e acompanhe tudo por aqui.</p>
            <a th:href="@{/painel/orcamentos/novo}" class="btn-primary">+ Solicitar orçamento</a>
        </div>
        <table th:unless="${#lists.isEmpty(orcamentos)}" style="width:100%;border-collapse:collapse">
            <thead><tr class="t-head">
                <th>Nº</th>
                <th>Serviço solicitado</th>
                <th>Data</th>
                <th>Valor</th>
                <th>Pedidos</th>
                <th>Status</th>
                <th></th>
            </tr></thead>
            <tbody>
            <tr th:each="orc : ${orcamentos}" class="t-row">
                <td style="font-weight:600;color:var(--text-muted);font-size:13px;font-family:monospace" th:text="'#' + ${orc.id}">—</td>
                <td style="font-weight:500" th:text="${orc.pessoa != null and orc.pessoa.tipoServico != null ? orc.pessoa.tipoServico : 'Serviço laboratorial'}">—</td>
                <td style="color:var(--text-muted)" th:text="${#temporals.format(orc.dataOrcamento,'dd/MM/yyyy')}">—</td>
                <td style="font-weight:600" th:text="${orc.valorTotal != null ? 'R$ ' + #numbers.formatDecimal(orc.valorTotal,1,'POINT',2,'COMMA') : '—'}">—</td>
                <td style="color:var(--text-muted)" th:text="${#lists.size(orc.pedidos)}">0</td>
                <td><span class="status-badge" th:classappend="'s-' + ${orc.status.name().toLowerCase()}" th:text="${orc.status.label}">—</span></td>
                <td><a th:href="@{/painel/orcamentos/{id}(id=${orc.id})}" class="link-ver">Detalhar →</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
