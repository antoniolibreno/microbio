<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Usuário - Microbio</title>
  <th:block th:replace="~{fragments/toast :: head}"></th:block>
  <link rel="stylesheet" th:href="@{/css/usuarios/novo.css}">
</head>
<body>

<aside th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></aside>

<main class="main">

  <div class="topbar">
    <a th:href="@{/usuarios}" class="back-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Usuários
    </a>
    <div class="topbar-divider"></div>
    <span class="topbar-title">Novo usuário</span>
  </div>


  <div class="form-card">

    <div class="tabs">
      <button class="tab-btn active" type="button" onclick="trocarAba('simples',this)">Acesso simples</button>
      <button class="tab-btn"        type="button" onclick="trocarAba('completo',this)">Com dados de cliente</button>
    </div>

    <!-- ── ABA: SIMPLES ── -->
    <div id="painel-simples" class="tab-panel active">
      <form th:action="@{/usuarios/salvar-simples}" method="post">

        <span class="sec-label">Perfil de acesso</span>
        <div class="role-picker">
          <label class="role-option">
            <input type="radio" name="admin" value="false" checked>
            <div class="role-card">
              <div class="role-icon icon-client">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="role-text">
                <strong>Cliente</strong>
                <span>Acessa o painel do cliente</span>
              </div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="admin" value="true">
            <div class="role-card">
              <div class="role-icon icon-admin">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
              <div class="role-text">
                <strong>Administrador</strong>
                <span>Acessa o painel admin</span>
              </div>
            </div>
          </label>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Dados de acesso</span>

        <div class="form-group">
          <label>Login</label>
          <input type="text" name="login" placeholder="Nome de usuário" required autocomplete="off">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" name="confirmarSenha" placeholder="Repita a senha" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Criar usuário
        </button>
      </form>
    </div>

    <!-- ── ABA: COMPLETO ── -->
    <div id="painel-completo" class="tab-panel">
      <form th:action="@{/usuarios/salvar-completo}" method="post">

        <span class="sec-label">Perfil de acesso</span>
        <div class="role-picker">
          <label class="role-option">
            <input type="radio" name="admin" value="false" checked>
            <div class="role-card">
              <div class="role-icon icon-client">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="role-text">
                <strong>Cliente</strong>
                <span>Acessa o painel do cliente</span>
              </div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="admin" value="true">
            <div class="role-card">
              <div class="role-icon icon-admin">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
              <div class="role-text">
                <strong>Administrador</strong>
                <span>Acessa o painel admin</span>
              </div>
            </div>
          </label>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Dados de acesso</span>

        <div class="form-group">
          <label>Login</label>
          <input type="text" name="login" placeholder="Nome de usuário" required autocomplete="off">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" name="confirmarSenha" placeholder="Repita a senha" required>
          </div>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Dados do cliente</span>

        <div class="row-2">
          <div class="form-group">
            <label>Tipo de cliente</label>
            <select name="tipoCliente">
              <option value="">Selecione…</option>
              <option value="Pessoa Física">Pessoa Física</option>
              <option value="Pessoa Jurídica">Pessoa Jurídica</option>
            </select>
          </div>
          <div class="form-group">
            <label>CPF / CNPJ</label>
            <input type="text" name="cpfCnpj" placeholder="000.000.000-00">
          </div>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Endereço</span>

        <div class="row-2">
          <div class="form-group">
            <label>CEP</label>
            <input type="text" name="cep" placeholder="00000-000" maxlength="9">
          </div>
          <div class="form-group">
            <label>Estado (UF)</label>
            <input type="text" name="estado" placeholder="PR" maxlength="2">
          </div>
        </div>
        <div class="form-group">
          <label>Cidade</label>
          <input type="text" name="cidade" placeholder="Nome da cidade">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Rua</label>
            <input type="text" name="rua" placeholder="Nome da rua">
          </div>
          <div class="form-group">
            <label>Número</label>
            <input type="text" name="numero" placeholder="123">
          </div>
        </div>
        <div class="form-group">
          <label>Bairro</label>
          <input type="text" name="bairro" placeholder="Nome do bairro">
        </div>

        <button type="submit" class="btn-submit">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Cadastrar usuário
        </button>
      </form>
    </div>

  </div>
</main>

<div th:replace="~{fragments/toast :: root}"></div>
<script th:src="@{/js/usuarios/novo.js}" defer></script>
<script th:replace="~{fragments/toast :: script}"></script>
</body>
</html>
