<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - Microbio</title>
  <style>
    :root {
      --primary:#1a702b; --primary-hover:#135c22; --primary-light:#e8f5e9; --primary-glow:rgba(26,112,43,.12);
      --sidebar-w:240px; --text-dark:#0f172a; --text-body:#334155; --text-muted:#64748b; --text-faint:#94a3b8;
      --bg:#f8fafc; --surface:#fff; --border:#e2e8f0; --border-faint:#f1f5f9;
      --font:'Inter',system-ui,sans-serif; --radius-sm:8px; --radius-md:12px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 16px rgba(0,0,0,.08);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--text-body);display:flex;min-height:100vh}

    .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}

    .main{margin-left:var(--sidebar-w);flex:1;padding:32px 36px;display:flex;flex-direction:column;gap:24px}

    .page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
    .header-left h1{font-size:22px;font-weight:800;color:var(--text-dark);letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
    .header-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1a702b,#2d9e42);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(26,112,43,.3);flex-shrink:0}
    .header-left p{color:var(--text-muted);font-size:13.5px;margin-top:4px}
    .btn-new{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;background:var(--primary);color:#fff;border-radius:var(--radius-sm);text-decoration:none;font-size:13.5px;font-weight:600;transition:background .2s;white-space:nowrap}
    .btn-new:hover{background:var(--primary-hover)}

    .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
    .alert-danger {background:#fff1f2;color:#9f1239;border:1px solid #fda4af}
    .alert-success{background:#f0fdf4;color:#15803d;border:1px solid #86efac}

    .table-card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden}
    .table-toolbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .search-wrap{position:relative;flex:1;max-width:320px}
    .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none}
    .search-input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text-dark);background:var(--bg);outline:none;transition:all .2s}
    .search-input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-glow)}
    .search-input::placeholder{color:var(--text-faint)}
    .table-count{margin-left:auto;font-size:12px;color:var(--text-faint);font-weight:500}

    table{width:100%;border-collapse:collapse}
    thead th{background:#f8fafc;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border)}
    tbody tr{border-bottom:1px solid var(--border-faint);transition:background .1s}
    tbody tr:hover{background:#fafafa}
    tbody tr:last-child{border-bottom:none}
    td{padding:13px 16px;font-size:13.5px;vertical-align:middle}

    .td-user{display:flex;align-items:center;gap:12px}
    .u-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;text-transform:uppercase;flex-shrink:0}
    .avatar-admin {background:linear-gradient(135deg,#7c3aed,#a855f7)}
    .avatar-client{background:linear-gradient(135deg,#1a702b,#2d9e42)}
    .u-name{font-weight:600;color:var(--text-dark)}
    .u-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px}

    .role-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
    .role-admin {background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
    .role-client{background:var(--primary-light);color:var(--primary);border:1px solid #bbf7d0}
    .role-simple{background:#f8fafc;color:var(--text-muted);border:1px solid var(--border)}

    .actions{display:flex;gap:6px;flex-wrap:wrap}
    .btn-act{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .15s}
    .btn-view  {background:#f1f5f9;color:#334155}
    .btn-view:hover{background:#e2e8f0}
    .btn-edit  {background:#eff6ff;color:#1d4ed8}
    .btn-edit:hover{background:#dbeafe}
    .btn-del   {background:#fff1f2;color:#be123c}
    .btn-del:hover{background:#ffe4e6}

    .empty-state{padding:60px 40px;text-align:center;color:var(--text-faint)}
    .empty-state svg{margin-bottom:12px;opacity:.4}
    .empty-state p{font-size:14px}
  </style>
</head>
<body>

<aside th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></aside>

<main class="main">

  <div class="page-header">
    <div class="header-left">
      <h1>
        <span class="header-icon">
          <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        Usuários
      </h1>
      <p>Gerencie os usuários e permissões de acesso ao sistema</p>
    </div>
    <a th:href="@{/usuarios/novo}" class="btn-new">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo usuário
    </a>
  </div>

  <div th:if="${erro}"    class="alert alert-danger" >❌ <span th:text="${erro}"></span></div>
  <div th:if="${sucesso}" class="alert alert-success">✅ <span th:text="${sucesso}"></span></div>

  <div class="table-card">
    <div class="table-toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar usuário…" oninput="filtrar()">
      </div>
      <span class="table-count" id="countLabel"
            th:text="${usuarios != null ? usuarios.size() + ' usuário(s)' : '0 usuário(s)'}">0 usuário(s)</span>
    </div>

    <table id="userTable">
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Cadastro</th>
          <th style="text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(usuarios)}">
          <td colspan="4">
            <div class="empty-state">
              <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <p>Nenhum usuário cadastrado ainda.</p>
            </div>
          </td>
        </tr>
        <tr th:each="u : ${usuarios}" th:with="login=${u.login != null ? u.login : ''},
                                                hasCliente=${u.cliente != null}">
          <td>
            <div class="td-user">
              <div class="u-avatar" th:classappend="${u.admin} ? 'avatar-admin' : 'avatar-client'"
                   th:text="${#strings.toUpperCase(login.length() &lt; 2 ? login : login.substring(0,2))}">??</div>
              <div>
                <div class="u-name" th:text="${login}">login</div>
                <div class="u-sub" th:text="'ID #' + ${u.id}">ID #0</div>
              </div>
            </div>
          </td>
          <td>
            <span th:if="${u.admin}" class="role-badge role-admin">
              <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              Administrador
            </span>
            <span th:if="${!u.admin and hasCliente}" class="role-badge role-client">
              <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Cliente
            </span>
            <span th:if="${!u.admin and !hasCliente}" class="role-badge role-simple">
              Só acesso
            </span>
          </td>
          <td>
            <span th:if="${hasCliente}" style="font-size:12.5px;color:var(--text-muted);"
                  th:text="${u.cliente.tipoCliente != null and !#strings.isEmpty(u.cliente.tipoCliente) ? u.cliente.tipoCliente : 'Cliente'}">—</span>
            <span th:unless="${hasCliente}" style="font-size:12.5px;color:var(--text-faint);">—</span>
          </td>
          <td>
            <div class="actions" style="justify-content:flex-end">
              <a th:href="@{/usuarios/{id}/visualizar(id=${u.id})}" class="btn-act btn-view">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Ver
              </a>
              <a th:href="@{/usuarios/{id}/editar(id=${u.id})}" class="btn-act btn-edit">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Editar
              </a>
              <form th:action="@{/usuarios/{id}/excluir(id=${u.id})}" method="post"
                    onsubmit="return confirm('Excluir este usuário?')">
                <button type="submit" class="btn-act btn-del">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                  Excluir
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<script>
  function filtrar() {
    const t = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('#userTable tbody tr');
    let vis = 0, total = 0;
    rows.forEach(r => {
      if (r.querySelector('.empty-state')) return;
      total++;
      const show = r.textContent.toLowerCase().includes(t);
      r.style.display = show ? '' : 'none';
      if (show) vis++;
    });
    const label = document.getElementById('countLabel');
    if (label) label.textContent = t ? vis + ' resultado(s)' : total + ' usuário(s)';
  }
</script>
</body>
</html>
