<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - Microbio</title>
  <link rel="stylesheet" th:href="@{/css/usuarios/lista.css}">
</head>
<body>

<aside th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></aside>

<main class="main">

  <div class="page-header">
    <div class="header-left">
      <h1>
        <span class="header-icon">
          <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        Usuários
      </h1>
      <p>Gerencie os usuários e permissões de acesso ao sistema</p>
    </div>
    <a th:href="@{/usuarios/novo}" class="btn-new">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo usuário
    </a>
  </div>

  <div th:if="${erro}"    class="alert alert-danger" >❌ <span th:text="${erro}"></span></div>
  <div th:if="${sucesso}" class="alert alert-success">✅ <span th:text="${sucesso}"></span></div>

  <div class="table-card">
    <div class="table-toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar usuário…" oninput="filtrar()">
      </div>
      <span class="table-count" id="countLabel"
            th:text="${usuarios != null ? usuarios.size() + ' usuário(s)' : '0 usuário(s)'}">0 usuário(s)</span>
    </div>

    <table id="userTable">
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Cadastro</th>
          <th style="text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(usuarios)}">
          <td colspan="4">
            <div class="empty-state">
              <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <p>Nenhum usuário cadastrado ainda.</p>
            </div>
          </td>
        </tr>
        <tr th:each="u : ${usuarios}" th:with="login=${u.login != null ? u.login : ''},
                                                hasCliente=${u.cliente != null}">
          <td>
            <div class="td-user">
              <div class="u-avatar" th:classappend="${u.admin} ? 'avatar-admin' : 'avatar-client'"
                   th:text="${#strings.toUpperCase(login.length() &lt; 2 ? login : login.substring(0,2))}">??</div>
              <div>
                <div class="u-name" th:text="${login}">login</div>
                <div class="u-sub" th:text="'ID #' + ${u.id}">ID #0</div>
              </div>
            </div>
          </td>
          <td>
            <span th:if="${u.admin}" class="role-badge role-admin">
              <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              Administrador
            </span>
            <span th:if="${!u.admin and hasCliente}" class="role-badge role-client">
              <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Cliente
            </span>
            <span th:if="${!u.admin and !hasCliente}" class="role-badge role-simple">
              Só acesso
            </span>
          </td>
          <td>
            <span th:if="${hasCliente}" style="font-size:12.5px;color:var(--text-muted);"
                  th:text="${u.cliente.tipoCliente != null and !#strings.isEmpty(u.cliente.tipoCliente) ? u.cliente.tipoCliente : 'Cliente'}">—</span>
            <span th:unless="${hasCliente}" style="font-size:12.5px;color:var(--text-faint);">—</span>
          </td>
          <td>
            <div class="actions" style="justify-content:flex-end">
              <a th:href="@{/usuarios/{id}/visualizar(id=${u.id})}" class="btn-act btn-view">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Ver
              </a>
              <a th:href="@{/usuarios/{id}/editar(id=${u.id})}" class="btn-act btn-edit">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Editar
              </a>
              <form th:action="@{/usuarios/{id}/excluir(id=${u.id})}" method="post"
                    onsubmit="return confirm('Excluir este usuário?')">
                <button type="submit" class="btn-act btn-del">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                  Excluir
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<script th:src="@{/js/usuarios/lista.js}" defer></script>
</body>
</html>
