<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - Microbio</title>
    <style>
        :root {
            --primary:       #1a702b;
            --primary-hover: #135c22;
            --primary-light: #e8f5e9;
            --sidebar-w:     240px;
            --text-dark:     #1f2937;
            --text-muted:    #6b7280;
            --bg:            #f3f4f6;
            --font:          'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text-dark); display:flex; min-height:100vh; }

        /* SIDEBAR */
        .sidebar { width:var(--sidebar-w); background:#fff; border-right:1px solid #e5e7eb; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; }
        .sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid #e5e7eb; }
        .sidebar-brand h1 { color:var(--primary); font-size:20px; font-weight:700; }
        .sidebar-brand p  { color:var(--text-muted); font-size:11px; margin-top:2px; }
        .sidebar-nav  { flex:1; padding:16px 12px; overflow-y:auto; }
        .nav-section  { font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; padding:12px 8px 6px; display:block; }
        .nav-link { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; transition:background .15s,color .15s; margin-bottom:2px; }
        .nav-link:hover, .nav-link.active { background:var(--primary-light); color:var(--primary); }
        .nav-link.active { font-weight:600; }
        .sidebar-footer { padding:16px 12px; border-top:1px solid #e5e7eb; }
        .user-info { display:flex; align-items:center; gap:10px; padding:8px; margin-bottom:8px; }
        .user-avatar { width:32px; height:32px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }
        .user-name { font-size:13px; font-weight:600; }
        .user-role { font-size:11px; color:var(--text-muted); }
        .btn-logout { width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:9px; background:none; border:1px solid #e5e7eb; border-radius:8px; color:var(--text-muted); font-size:13px; font-weight:500; cursor:pointer; transition:background .15s,color .15s; }
        .btn-logout:hover { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }

        /* MAIN */
        .main { margin-left:var(--sidebar-w); flex:1; padding:32px; }
        .page-header { margin-bottom:24px; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px; }
        .page-header h2 { font-size:22px; font-weight:700; }
        .page-header p  { color:var(--text-muted); font-size:14px; margin-top:4px; }
        .btn-new {
            display:inline-flex; align-items:center; gap:6px;
            padding:10px 18px; background:var(--primary); color:#fff;
            border-radius:8px; text-decoration:none; font-size:14px; font-weight:600;
            white-space:nowrap; transition:background .2s;
        }
        .btn-new:hover { background:var(--primary-hover); }

        /* alertas */
        .alert { padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:14px; font-weight:500; }
        .alert-danger  { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
        .alert-success { background:#dcfce7; color:#15803d; border:1px solid #86efac; }

        /* TABELA */
        .table-card { background:#fff; border-radius:16px; box-shadow:0 1px 6px rgba(0,0,0,.06); overflow:hidden; }

        table { width:100%; border-collapse:collapse; }
        thead { background:var(--primary-light); }
        thead th { padding:13px 16px; text-align:left; font-size:12px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.5px; }
        tbody tr { border-bottom:1px solid #f3f4f6; transition:background .12s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:#fafafa; }
        tbody td { padding:14px 16px; font-size:14px; vertical-align:middle; }
        .td-id { color:var(--text-muted); font-size:12px; }

        /* ações */
        .actions { display:flex; gap:8px; }
        .btn-edit {
            display:inline-flex; align-items:center; gap:5px;
            padding:6px 12px; border-radius:6px;
            background:var(--primary-light); color:var(--primary);
            border:none; font-size:12px; font-weight:600; cursor:pointer;
            text-decoration:none; transition:background .15s;
        }
        .btn-edit:hover { background:#c6e6cc; }
        .btn-delete {
            display:inline-flex; align-items:center; gap:5px;
            padding:6px 12px; border-radius:6px;
            background:#fee2e2; color:#b91c1c;
            border:none; font-size:12px; font-weight:600; cursor:pointer;
            transition:background .15s;
        }
        .btn-delete:hover { background:#fecaca; }

        /* vazio */
        .empty { padding:48px; text-align:center; color:var(--text-muted); }
        .empty p { margin-top:8px; font-size:14px; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>🧫 Microbio</h1>
        <p>Laboratório de microbiologia</p>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section">Geral</span>
        <a th:href="@{/dashboard}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <span class="nav-section">Cadastros</span>
        <a th:href="@{/usuarios}" class="nav-link active">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Usuários / Clientes
        </a>
        <span class="nav-section">Operações</span>
        <a th:href="@{/orcamentos}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
            Orçamentos
        </a>
        <a th:href="@{/pedidos}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Pedidos
        </a>
        <a th:href="@{/analises}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Análises
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar">A</div>
            <div>
                <div class="user-name" sec:authentication="name">admin</div>
                <div class="user-role">Administrador</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sair
            </button>
        </form>
    </div>
</aside>

<!-- CONTEÚDO -->
<main class="main">

    <div class="page-header">
        <div>
            <h2>Usuários</h2>
            <p>Gerencie todos os usuários cadastrados no sistema</p>
        </div>
        <a th:href="@{/usuarios/novo}" class="btn-new">+ Novo usuário</a>
    </div>

    <div th:if="${erro}"    class="alert alert-danger"  th:text="${erro}"></div>
    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Login</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- th:each percorre a lista "usuarios" enviada pelo controller -->
                <tr th:each="u : ${usuarios}">
                    <td class="td-id" th:text="${u.id}">1</td>
                    <td th:text="${u.login}">admin</td>
                    <td>
                        <div class="actions">
                            <!-- Botão editar → vai para /usuarios/{id}/editar -->
                            <a th:href="@{/usuarios/{id}/editar(id=${u.id})}" class="btn-edit">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                Editar
                            </a>
                            <!-- Botão excluir → POST para /usuarios/{id}/excluir -->
                            <form th:action="@{/usuarios/{id}/excluir(id=${u.id})}" method="post"
                                  onsubmit="return confirm('Confirma a exclusão do usuário ' + /*[[${u.login}]]*/ '' + '?')">
                                <button type="submit" class="btn-delete">
                                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                                    Excluir
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>

                <!-- Linha quando não há usuários -->
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="3">
                        <div class="empty">
                            <svg width="40" height="40" fill="none" stroke="#d1d5db" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                            <p>Nenhum usuário cadastrado ainda.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
