<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Editar ' + ${usuario.login} + ' - Microbio'">Editar Usuário</title>
  <style>
    :root{
      --primary:#1a702b;--primary-hover:#135c22;--primary-light:#e8f5e9;--primary-glow:rgba(26,112,43,.12);
      --sidebar-w:240px;--text-dark:#0f172a;--text-body:#334155;--text-muted:#64748b;--text-faint:#94a3b8;
      --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--border-faint:#f1f5f9;
      --font:'Inter',system-ui,sans-serif;--radius-sm:8px;--radius-md:12px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--text-body);display:flex;min-height:100vh}

    .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}

    .main{margin-left:var(--sidebar-w);flex:1;padding:36px;display:flex;flex-direction:column;align-items:flex-start}

    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:28px;width:100%;max-width:640px;flex-wrap:wrap}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 10px;border-radius:var(--radius-sm);transition:background .15s,color .15s}
    .back-btn:hover{background:var(--border-faint);color:var(--text-dark)}
    .topbar-divider{width:1px;height:20px;background:var(--border)}
    .topbar-title{font-size:18px;font-weight:800;color:var(--text-dark);letter-spacing:-.3px}
    .topbar-badge{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
    .badge-admin {background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
    .badge-client{background:var(--primary-light);color:var(--primary);border:1px solid #bbf7d0}
    .badge-simple{background:#f8fafc;color:var(--text-muted);border:1px solid var(--border)}

    .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:20px;width:100%;max-width:640px}
    .alert-danger {background:#fff1f2;color:#9f1239;border:1px solid #fda4af}
    .alert-success{background:#f0fdf4;color:#15803d;border:1px solid #86efac}

    .form-card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);padding:28px 32px;width:100%;max-width:640px;box-shadow:0 1px 4px rgba(0,0,0,.05)}

    .tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:28px}
    .tab-btn{flex:1;padding:10px 16px;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-2px;font-size:13.5px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:color .2s,border-color .2s;font-family:var(--font)}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .sec-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-faint);margin:22px 0 12px;display:block}
    .sec-label:first-child{margin-top:0}

    /* role picker */
    .role-picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
    .role-option{position:relative}
    .role-option input{position:absolute;opacity:0;width:0;height:0}
    .role-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;transition:all .2s;background:var(--bg)}
    .role-option input:checked + .role-card{border-color:var(--primary);background:var(--primary-light)}
    .role-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .icon-admin {background:#ede9fe;color:#7c3aed}
    .icon-client{background:var(--primary-light);color:var(--primary)}
    .role-option input:checked + .role-card .icon-admin {background:#ddd6fe}
    .role-option input:checked + .role-card .icon-client{background:#bbf7d0}
    .role-text strong{display:block;font-size:13.5px;font-weight:700;color:var(--text-dark);margin-bottom:2px}
    .role-text span{font-size:11.5px;color:var(--text-muted);line-height:1.4}

    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:12.5px;font-weight:600;color:var(--text-body);margin-bottom:6px}
    .form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;font-family:var(--font);color:var(--text-dark);background:var(--surface);outline:none;transition:border-color .2s,box-shadow .2s}
    .form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
    .form-group input::placeholder{color:var(--text-faint)}
    .hint{font-size:11.5px;color:var(--text-faint);margin-top:4px}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field-sep{height:1px;background:var(--border-faint);margin:20px 0}

    .btn-submit{width:100%;margin-top:24px;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;justify-content:center;align-items:center;gap:8px;transition:background .2s}
    .btn-submit:hover{background:var(--primary-hover)}
  </style>
</head>
<body>

<aside th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></aside>

<main class="main">

  <div class="topbar">
    <a th:href="@{/usuarios}" class="back-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Usuários
    </a>
    <div class="topbar-divider"></div>
    <span class="topbar-title" th:text="${usuario.login}">Usuário</span>
    <span th:if="${usuario.admin}"         class="topbar-badge badge-admin">Administrador</span>
    <span th:if="${!usuario.admin and usuario.cliente != null}" class="topbar-badge badge-client">Cliente</span>
    <span th:if="${!usuario.admin and usuario.cliente == null}" class="topbar-badge badge-simple">Só acesso</span>
  </div>

  <div th:if="${erro}"    class="alert alert-danger" >❌ <span th:text="${erro}"></span></div>
  <div th:if="${sucesso}" class="alert alert-success">✅ <span th:text="${sucesso}"></span></div>

  <div class="form-card">

    <div class="tabs">
      <button class="tab-btn active" type="button" onclick="trocarAba('acesso',this)">Dados de acesso</button>
      <button class="tab-btn"        type="button" onclick="trocarAba('completo',this)">Dados do cliente</button>
    </div>

    <!-- ── ABA: ACESSO ── -->
    <div id="painel-acesso" class="tab-panel active">
      <form th:action="@{/usuarios/{id}/atualizar-acesso(id=${usuario.id})}" method="post">

        <span class="sec-label">Perfil de acesso</span>
        <div class="role-picker">
          <label class="role-option">
            <input type="radio" name="admin" value="false" th:checked="${!usuario.admin}">
            <div class="role-card">
              <div class="role-icon icon-client">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="role-text">
                <strong>Cliente</strong>
                <span>Acessa o painel do cliente</span>
              </div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="admin" value="true" th:checked="${usuario.admin}">
            <div class="role-card">
              <div class="role-icon icon-admin">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
              <div class="role-text">
                <strong>Administrador</strong>
                <span>Acessa o painel admin</span>
              </div>
            </div>
          </label>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Credenciais</span>

        <div class="form-group">
          <label>Login</label>
          <input type="text" name="login" th:value="${usuario.login}" required autocomplete="off">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Nova senha</label>
            <input type="password" name="senha" placeholder="Em branco = mantém atual">
          </div>
          <div class="form-group">
            <label>Confirmar nova senha</label>
            <input type="password" name="confirmarSenha" placeholder="Repita a senha">
          </div>
        </div>
        <p class="hint">Deixe a senha em branco para não alterá-la.</p>

        <button type="submit" class="btn-submit">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          Salvar
        </button>
      </form>
    </div>

    <!-- ── ABA: COMPLETO ── -->
    <div id="painel-completo" class="tab-panel">
      <form th:action="@{/usuarios/{id}/atualizar-completo(id=${usuario.id})}" method="post">

        <span class="sec-label">Perfil de acesso</span>
        <div class="role-picker">
          <label class="role-option">
            <input type="radio" name="admin" value="false" th:checked="${!usuario.admin}">
            <div class="role-card">
              <div class="role-icon icon-client">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="role-text">
                <strong>Cliente</strong>
                <span>Acessa o painel do cliente</span>
              </div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="admin" value="true" th:checked="${usuario.admin}">
            <div class="role-card">
              <div class="role-icon icon-admin">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
              <div class="role-text">
                <strong>Administrador</strong>
                <span>Acessa o painel admin</span>
              </div>
            </div>
          </label>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Credenciais</span>

        <div class="form-group">
          <label>Login</label>
          <input type="text" name="login" th:value="${usuario.login}" required autocomplete="off">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Nova senha</label>
            <input type="password" name="senha" placeholder="Em branco = mantém atual">
          </div>
          <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" name="confirmarSenha" placeholder="Repita a senha">
          </div>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Dados do cliente</span>

        <div class="row-2">
          <div class="form-group">
            <label>Tipo de cliente</label>
            <select name="tipoCliente">
              <option value="">Selecione…</option>
              <option value="Pessoa Física"   th:selected="${usuario.cliente != null and usuario.cliente.tipoCliente == 'Pessoa Física'}">Pessoa Física</option>
              <option value="Pessoa Jurídica" th:selected="${usuario.cliente != null and usuario.cliente.tipoCliente == 'Pessoa Jurídica'}">Pessoa Jurídica</option>
            </select>
          </div>
          <div class="form-group">
            <label>CPF / CNPJ</label>
            <input type="text" name="cpfCnpj" th:value="${usuario.cliente?.cpfCnpj}" placeholder="000.000.000-00">
          </div>
        </div>

        <div class="field-sep"></div>
        <span class="sec-label">Endereço</span>

        <div class="row-2">
          <div class="form-group">
            <label>CEP</label>
            <input type="text" name="cep" th:value="${usuario.cliente?.endereco?.cep}" placeholder="00000-000" maxlength="9">
          </div>
          <div class="form-group">
            <label>Estado (UF)</label>
            <input type="text" name="estado" th:value="${usuario.cliente?.endereco?.estado}" placeholder="PR" maxlength="2">
          </div>
        </div>
        <div class="form-group">
          <label>Cidade</label>
          <input type="text" name="cidade" th:value="${usuario.cliente?.endereco?.cidade}" placeholder="Nome da cidade">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Rua</label>
            <input type="text" name="rua" th:value="${usuario.cliente?.endereco?.rua}" placeholder="Nome da rua">
          </div>
          <div class="form-group">
            <label>Número</label>
            <input type="text" name="numero" th:value="${usuario.cliente?.endereco?.numero}" placeholder="123">
          </div>
        </div>
        <div class="form-group">
          <label>Bairro</label>
          <input type="text" name="bairro" th:value="${usuario.cliente?.endereco?.bairro}" placeholder="Nome do bairro">
        </div>

        <button type="submit" class="btn-submit">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          Salvar cadastro completo
        </button>
      </form>
    </div>

  </div>
</main>

<script th:inline="javascript">
  function trocarAba(nome, botao) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('painel-' + nome).classList.add('active');
    botao.classList.add('active');
  }
  window.addEventListener('DOMContentLoaded', () => {
    const temCliente = /*[[${usuario.cliente != null}]]*/ false;
    if (temCliente) trocarAba('completo', document.querySelectorAll('.tab-btn')[1]);
  });
</script>
</body>
</html>
