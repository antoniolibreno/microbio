<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitações de Orçamento - Microbio</title>
    <th:block th:replace="~{fragments/toast :: head}"></th:block>
  <link rel="stylesheet" th:href="@{/css/solicitacoes/lista.css}">
</head>
<body>

<aside th:replace="~{fragments/sidebar :: sidebar('')}"></aside>

<main class="main">
    <div class="page-header">
        <div class="page-header-text">
            <h2>
                Solicitações de Orçamento
                <span class="badge" th:text="${#lists.size(solicitacoes)}">0</span>
            </h2>
            <p>Leads que chegaram pelo site e aguardam cadastro completo.</p>
        </div>
    </div>

    <div class="table-card">
        <div class="table-toolbar">
            <div class="search-box">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar por nome, email ou serviço..." oninput="filtrarTabela()">
            </div>
        </div>

        <div th:if="${#lists.isEmpty(solicitacoes)}" class="empty-state">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>Nenhuma solicitação ainda</h3>
            <p>Quando alguém preencher o formulário do site, aparecerá aqui.</p>
        </div>

        <table th:unless="${#lists.isEmpty(solicitacoes)}" id="tabelaSolicitacoes">
            <thead>
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Contato</th>
                <th>Serviço Solicitado</th>
                <th>Status</th>
                <th>Data</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${solicitacoes}">
                <td th:text="${p.id}" style="color:var(--text-muted);font-size:13px;"></td>
                <td class="nome" th:text="${p.nome}">—</td>
                <td class="contato">
                    <span th:if="${p.email}"    th:text="${p.email}"></span>
                    <span th:if="${p.telefone}" th:text="${p.telefone}"></span>
                    <span th:if="${p.email == null and p.telefone == null}" style="color:#d1d5db;">Não informado</span>
                </td>
                <td>
                    <!-- Chips coloridos por tipo de serviço -->
                    <span th:switch="${p.tipoServico}">
                            <span th:case="'Microbiologia'"                     class="chip chip-micro"  th:text="${p.tipoServico}"></span>
                            <span th:case="'Bioquimica'"                        class="chip chip-bio"    th:text="${p.tipoServico}"></span>
                            <span th:case="'Hematologia'"                       class="chip chip-hema"   th:text="${p.tipoServico}"></span>
                            <span th:case="'Imunologia'"                        class="chip chip-imuno"  th:text="${p.tipoServico}"></span>
                            <span th:case="'Controle de Qualidade em Bioinsumos'" class="chip chip-qual" th:text="${p.tipoServico}"></span>
                            <span th:case="*"                                   class="chip chip-outro"  th:text="${p.tipoServico}"></span>
                        </span>
                </td>
                <td>
                    <span th:if="${p.cliente != null}"   class="status-badge status-vinculado">Cadastrado</span>
                    <span th:if="${p.cliente == null}"   class="status-badge status-pendente">Pendente</span>
                </td>
                <td class="data" th:text="${#temporals.format(p.dataSol, 'dd/MM/yyyy HH:mm')}">—</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/toast :: root}"></div>
<script th:src="@{/js/solicitacoes/lista.js}" defer></script>
<script th:replace="~{fragments/toast :: script}"></script>

</body>
</html>
