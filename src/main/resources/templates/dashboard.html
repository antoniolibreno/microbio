<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Microbio</title>
    <style>
        :root {
            --primary:       #1a702b;
            --primary-hover: #135c22;
            --primary-light: #e8f5e9;
            --sidebar-w:     240px;
            --text-dark:     #1f2937;
            --text-muted:    #6b7280;
            --bg:            #f3f4f6;
            --font:          'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text-dark); display:flex; min-height:100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            width:var(--sidebar-w); background:#fff;
            border-right:1px solid #e5e7eb;
            display:flex; flex-direction:column;
            position:fixed; top:0; left:0; bottom:0;
        }
        .sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid #e5e7eb; }
        .sidebar-brand h1 { color:var(--primary); font-size:20px; font-weight:700; }
        .sidebar-brand p  { color:var(--text-muted); font-size:11px; margin-top:2px; }
        .sidebar-nav  { flex:1; padding:16px 12px; overflow-y:auto; }
        .nav-section  { font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; padding:12px 8px 6px; display:block; }
        .nav-link {
            display:flex; align-items:center; gap:10px;
            padding:9px 12px; border-radius:8px;
            color:var(--text-muted); text-decoration:none;
            font-size:14px; font-weight:500;
            transition:background .15s,color .15s; margin-bottom:2px;
        }
        .nav-link:hover, .nav-link.active { background:var(--primary-light); color:var(--primary); }
        .nav-link.active { font-weight:600; }
        .sidebar-footer { padding:16px 12px; border-top:1px solid #e5e7eb; }
        .user-info { display:flex; align-items:center; gap:10px; padding:8px; margin-bottom:8px; }
        .user-avatar {
            width:32px; height:32px; background:var(--primary); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:13px; font-weight:700; flex-shrink:0;
        }
        .user-name { font-size:13px; font-weight:600; }
        .user-role { font-size:11px; color:var(--text-muted); }
        .btn-logout {
            width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
            padding:9px; background:none; border:1px solid #e5e7eb; border-radius:8px;
            color:var(--text-muted); font-size:13px; font-weight:500; cursor:pointer;
            transition:background .15s,color .15s;
        }
        .btn-logout:hover { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }

        /* ── MAIN ── */
        .main { margin-left:var(--sidebar-w); flex:1; padding:32px; }
        .page-header { margin-bottom:28px; }
        .page-header h2 { font-size:22px; font-weight:700; }
        .page-header p  { color:var(--text-muted); font-size:14px; margin-top:4px; }

        .cards-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
            gap:16px; margin-bottom:32px;
        }
        .summary-card {
            background:#fff; border-radius:12px; padding:20px;
            box-shadow:0 1px 4px rgba(0,0,0,.06);
        }
        .summary-card .label { font-size:12px; color:var(--text-muted); font-weight:500; }
        .summary-card .value { font-size:28px; font-weight:700; color:var(--primary); margin-top:4px; }

        .quick-actions { display:flex; flex-wrap:wrap; gap:12px; }
        .quick-btn {
            display:inline-flex; align-items:center; gap:8px;
            padding:11px 20px; background:var(--primary); color:#fff;
            border-radius:8px; text-decoration:none;
            font-size:14px; font-weight:600; transition:background .2s;
        }
        .quick-btn:hover { background:var(--primary-hover); }
        .quick-btn.outline {
            background:#fff; color:var(--primary);
            border:1.5px solid var(--primary);
        }
        .quick-btn.outline:hover { background:var(--primary-light); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>🧫 Microbio</h1>
        <p>Laboratório de microbiologia</p>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section">Geral</span>
        <a th:href="@{/dashboard}" class="nav-link active">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <span class="nav-section">Cadastros</span>
        <a th:href="@{/usuarios}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Usuários / Clientes
        </a>
        <span class="nav-section">Operações</span>
        <a th:href="@{/orcamentos}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Orçamentos
        </a>
        <a th:href="@{/pedidos}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Pedidos
        </a>
        <a th:href="@{/analises}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Análises
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar">A</div>
            <div>
                <div class="user-name" sec:authentication="name">admin</div>
                <div class="user-role">Administrador</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sair
            </button>
        </form>
    </div>
</aside>

<main class="main">
    <div class="page-header">
        <h2>Dashboard</h2>
        <p>Visão geral do sistema</p>
    </div>

    <div class="cards-grid">
        <div class="summary-card">
            <div class="label">Usuários</div>
            <div class="value" th:text="${totalUsuarios}">0</div>
        </div>
        <div class="summary-card">
            <div class="label">Clientes</div>
            <div class="value" th:text="${totalClientes}">0</div>
        </div>
        <div class="summary-card">
            <div class="label">Pedidos</div>
            <div class="value">0</div>
        </div>
        <div class="summary-card">
            <div class="label">Análises</div>
            <div class="value">0</div>
        </div>
    </div>

    <div class="page-header">
        <h2>Acesso rápido</h2>
    </div>
    <div class="quick-actions">
        <a th:href="@{/usuarios/novo}" class="quick-btn">+ Novo usuário</a>
        <a th:href="@{/usuarios}" class="quick-btn outline">Ver todos os usuários</a>
    </div>
</main>

</body>
</html>
