spring.application.name=microbio

# POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5432/microbio_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SWAGGER / OPENAPI
springdoc.packages-to-scan=com.arthurberwanger.microbio.controller
springdoc.paths-to-match=/api/**, /usuarios/**, /analises/**
springdoc.swagger-ui.path=/swagger-ui.html