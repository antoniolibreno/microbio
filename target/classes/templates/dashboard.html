<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Microbio</title>
    <style>
        :root {
            --primary: #1a702b;
            --primary-hover: #135c22;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: #f3f4f6;
            min-height: 100vh;
        }

        nav {
            background: var(--primary);
            color: #fff;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }

        .user-area {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
        }

        /* Logout: DEVE ser form POST, nunca link GET */
        .btn-logout {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.25); }

        main {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            padding: 32px;
        }

        .card h2 { color: var(--primary); margin-bottom: 10px; }
        .card p  { color: #6b7280; line-height: 1.6; }
    </style>
</head>
<body>

<nav>
    <span class="brand">🧫 Microbio</span>
    <div class="user-area">
        <!-- sec:authentication="name" exibe o login do usuário autenticado -->
        <span>Olá, <strong sec:authentication="name">usuário</strong></span>

        <!-- Logout com POST — obrigatório pelo Spring Security (proteção CSRF) -->
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">Sair</button>
        </form>
    </div>
</nav>

<main>
    <div class="card">
        <h2>Dashboard</h2>
        <p>Bem-vindo ao sistema de gestão MicroBio. Login realizado com sucesso!</p>
    </div>
</main>

</body>
</html>
