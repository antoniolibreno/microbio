<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - Microbio</title>
    <style>
        :root { --primary:#1a702b; --primary-hover:#135c22; --primary-light:#e8f5e9; --sidebar-w:240px; --text-dark:#1f2937; --text-muted:#6b7280; --bg-input:#f3f4f6; --bg:#f3f4f6; --font:'Inter',system-ui,-apple-system,sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text-dark); display:flex; min-height:100vh; }
        .sidebar { width:var(--sidebar-w); background:#fff; border-right:1px solid #e5e7eb; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; }
        .sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid #e5e7eb; }
        .sidebar-brand h1 { color:var(--primary); font-size:20px; font-weight:700; }
        .sidebar-brand p  { color:var(--text-muted); font-size:11px; margin-top:2px; }
        .sidebar-nav  { flex:1; padding:16px 12px; overflow-y:auto; }
        .nav-section  { font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; padding:12px 8px 6px; display:block; }
        .nav-link { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; transition:background .15s,color .15s; margin-bottom:2px; }
        .nav-link:hover,.nav-link.active { background:var(--primary-light); color:var(--primary); }
        .nav-link.active { font-weight:600; }
        .sidebar-footer { padding:16px 12px; border-top:1px solid #e5e7eb; }
        .user-info { display:flex; align-items:center; gap:10px; padding:8px; margin-bottom:8px; }
        .user-avatar { width:32px; height:32px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }
        .user-name { font-size:13px; font-weight:600; }
        .user-role { font-size:11px; color:var(--text-muted); }
        .btn-logout { width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:9px; background:none; border:1px solid #e5e7eb; border-radius:8px; color:var(--text-muted); font-size:13px; font-weight:500; cursor:pointer; transition:background .15s,color .15s; }
        .btn-logout:hover { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }
        .main { margin-left:var(--sidebar-w); flex:1; padding:32px; }
        .page-header { margin-bottom:28px; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px; }
        .page-header h2 { font-size:22px; font-weight:700; }
        .page-header p { color:var(--text-muted); font-size:14px; margin-top:4px; }
        .btn-back { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:1.5px solid #e5e7eb; border-radius:8px; color:var(--text-muted); text-decoration:none; font-size:13px; font-weight:500; background:#fff; transition:border-color .15s,color .15s; }
        .btn-back:hover { border-color:var(--primary); color:var(--primary); }
        .form-card { background:#fff; border-radius:16px; box-shadow:0 1px 6px rgba(0,0,0,.06); padding:32px; max-width:480px; }
        .alert { padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:14px; font-weight:500; }
        .alert-danger  { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
        .alert-success { background:#dcfce7; color:#15803d; border:1px solid #86efac; }
        .section-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; margin:0 0 16px; display:block; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; }
        .form-group input { width:100%; padding:11px 14px; background:var(--bg-input); border:2px solid transparent; border-radius:8px; font-size:14px; color:var(--text-dark); outline:none; transition:border-color .2s; }
        .form-group input:focus { border-color:var(--primary); }
        .hint { font-size:12px; color:var(--text-muted); margin-top:4px; }
        .btn-submit { width:100%; margin-top:24px; padding:13px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:background .2s; }
        .btn-submit:hover { background:var(--primary-hover); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>🧫 Microbio</h1>
        <p>Laboratório de microbiologia</p>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section">Geral</span>
        <a th:href="@{/dashboard}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <span class="nav-section">Cadastros</span>
        <a th:href="@{/usuarios}" class="nav-link active">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Usuários / Clientes
        </a>
        <span class="nav-section">Operações</span>
        <a th:href="@{/orcamentos}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Orçamentos
        </a>
        <a th:href="@{/pedidos}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Pedidos
        </a>
        <a th:href="@{/analises}" class="nav-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Análises
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar">A</div>
            <div>
                <div class="user-name" sec:authentication="name">admin</div>
                <div class="user-role">Administrador</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sair
            </button>
        </form>
    </div>
</aside>

<main class="main">
    <div class="page-header">
        <div>
            <h2>Editar usuário</h2>
            <p th:text="'Editando: ' + ${usuario.login}">Editando: admin</p>
        </div>
        <a th:href="@{/usuarios}" class="btn-back">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Voltar
        </a>
    </div>

    <div class="form-card">

        <div th:if="${erro}"    class="alert alert-danger"  th:text="${erro}"></div>
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

        <!--
            th:action monta a URL com o ID do usuário: /usuarios/1/atualizar
        -->
        <form th:action="@{/usuarios/{id}/atualizar(id=${usuario.id})}" method="post">

            <span class="section-title">Dados de acesso</span>

            <div class="form-group">
                <label for="login">Login</label>
                <!--
                    th:value preenche o campo com o login atual do usuário
                -->
                <input type="text" id="login" name="login"
                       th:value="${usuario.login}" required>
            </div>

            <div class="form-group">
                <label for="senha">Nova senha</label>
                <input type="password" id="senha" name="senha"
                       placeholder="Deixe em branco para manter a atual">
                <p class="hint">Preencha apenas se quiser alterar a senha.</p>
            </div>

            <div class="form-group">
                <label for="confirmarSenha">Confirmar nova senha</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha"
                       placeholder="Repita a nova senha">
            </div>

            <button type="submit" class="btn-submit">Salvar alterações</button>

        </form>
    </div>
</main>

</body>
</html>
